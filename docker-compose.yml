version: "3.9"

services:
  backend:
    build: ./backend
    container_name: system-monitor-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: system-monitor-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend